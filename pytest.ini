[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --strict-markers
    --cov=src
    --cov-report=html
    --cov-report=term-missing
markers =
    unit: Unit tests
    integration: Integration tests
    property: Property-based tests
    e2e: End-to-end tests
filterwarnings =
    error
    ; --- サードパーティライブラリの避けられないWarning（ホワイトリスト） ---
    ; urllib3: LibreSSL環境でのOpenSSL互換性警告（import時に発火するためモジュールパターンで除外）
    ignore:urllib3 v2 only supports OpenSSL:Warning
    ; testcontainers: 内部デコレータの非推奨警告（ライブラリ側の修正待ち）
    ignore:The @wait_container_is_ready decorator is deprecated:DeprecationWarning
    ; pydantic: class-based config の非推奨警告（Celery等が使用）
    ignore:Support for class-based `config` is deprecated:DeprecationWarning
    ; crypt: Python 3.11+ で非推奨（サードパーティが間接インポートする場合）
    ignore:'crypt' is deprecated:DeprecationWarning
