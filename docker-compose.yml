version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: payment-monitor-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payment_monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payment_monitor_pass}
      POSTGRES_DB: ${POSTGRES_DB:-payment_monitor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payment_monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payment-monitor-network

  # Redis (Celery Broker)
  redis:
    image: redis:7.2-alpine
    container_name: payment-monitor-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payment-monitor-network

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: payment-monitor-api
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-payment_monitor}:${POSTGRES_PASSWORD:-payment_monitor_pass}@postgres:5432/${POSTGRES_DB:-payment_monitor}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - screenshots_data:/app/screenshots
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - payment-monitor-network

  # Celery Worker
  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: payment-monitor-celery-worker
    command: celery -A src.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-payment_monitor}:${POSTGRES_PASSWORD:-payment_monitor_pass}@postgres:5432/${POSTGRES_DB:-payment_monitor}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - screenshots_data:/app/screenshots
    healthcheck:
      test: ["CMD", "celery", "-A", "src.celery_app", "inspect", "ping", "--timeout", "10"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - payment-monitor-network

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: payment-monitor-celery-beat
    command: celery -A src.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-payment_monitor}:${POSTGRES_PASSWORD:-payment_monitor_pass}@postgres:5432/${POSTGRES_DB:-payment_monitor}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "celery", "-A", "src.celery_app", "inspect", "ping", "--timeout", "10"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - payment-monitor-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: payment-monitor-frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:${API_PORT:-8000}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - payment-monitor-network

volumes:
  postgres_data:
  redis_data:
  screenshots_data:

networks:
  payment-monitor-network:
    driver: bridge
